<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Project Tracker</title>
<link rel="icon" href="favicon.svg" id="faviconLink" />
<style>
  :root {
    --primary:#2f5d86; --accent:#4b90c4; --bg:#0d1117; --surface:#161b22;
    --surface2:#1c2430; --border:#2b3646; --fg:#e8eef5; --muted:#93a1b3;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px; line-height:1.5; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
  .app { display:flex; min-height:100vh; }
  aside { width:230px; background:#0b0f14; border-right:1px solid var(--border);
    padding:20px 14px; flex-shrink:0; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .brand { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .brand .shield { width:34px; height:34px; border-radius:7px; flex-shrink:0; overflow:hidden;
    background:linear-gradient(160deg,var(--primary),#1b3a55);
    display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; font-size:12px; }
  .brand .shield img { width:100%; height:100%; object-fit:cover; }
  .brand h1 { font-size:15px; margin:0; line-height:1.2; }
  .brand small { color:var(--muted); font-size:11px; }
  nav { margin-top:22px; display:flex; flex-direction:column; gap:2px; }
  nav button { text-align:left; background:none; border:none; color:var(--muted); cursor:pointer;
    padding:9px 11px; border-radius:7px; font-size:13.5px; width:100%; display:flex; align-items:center; gap:9px; }
  nav button:hover { background:var(--surface); color:var(--fg); }
  nav button.active { background:var(--primary); color:#fff; }
  .who { margin-top:24px; padding-top:16px; border-top:1px solid var(--border); font-size:12px; color:var(--muted); }
  .who .name { color:var(--fg); font-weight:600; font-size:13px; }
  .rolechip { display:inline-block; padding:2px 9px; border-radius:5px; font-size:11.5px; background:var(--surface2); border:1px solid var(--border); color:var(--fg); }
  main { flex:1; padding:26px 32px; max-width:1200px; }
  .page-head { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px; flex-wrap:wrap; }
  .page-head h2 { margin:0 0 4px; font-size:22px; }
  .page-head p { margin:0; color:var(--muted); }
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:26px; }
  .kpi { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; }
  .kpi .n { font-size:28px; font-weight:700; }
  .kpi .l { color:var(--muted); font-size:12.5px; margin-top:2px; }
  .kpi.warn .n { color:#e07a7a; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media (max-width:820px){ .grid2 { grid-template-columns:1fr; } aside{ display:none; } }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px; }
  .card h3 { margin:0 0 12px; font-size:15px; }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle; }
  th { color:var(--muted); font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; }
  th.sortable { cursor:pointer; user-select:none; }
  th.sortable:hover { color:var(--fg); }
  tr:last-child td { border-bottom:none; }
  tbody tr:hover { background:var(--surface2); }
  .badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:11.5px; font-weight:600; color:#fff; white-space:nowrap; }
  .overdue { display:inline-block; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:700; background:#7a2020; color:#ffd7d7; margin-left:6px; }
  .btn { background:var(--primary); color:#fff; border:none; border-radius:7px; padding:8px 14px; font-size:13px; cursor:pointer; }
  .btn:hover { filter:brightness(1.1); }
  .btn.ghost { background:var(--surface2); border:1px solid var(--border); }
  .btn.danger { background:#7a2626; }
  .btn.sm { padding:5px 10px; font-size:12px; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn.block { width:100%; }
  .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
  input,select,textarea { background:var(--surface); color:var(--fg); border:1px solid var(--border);
    border-radius:7px; padding:8px 10px; font-size:13px; font-family:inherit; }
  input[type=color]{ padding:2px; height:34px; width:52px; cursor:pointer; }
  input:focus,select:focus,textarea:focus { outline:2px solid var(--accent); outline-offset:-1px; }
  label { display:block; font-size:12px; color:var(--muted); margin:12px 0 5px; }
  .kanban { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  @media (max-width:820px){ .kanban { grid-template-columns:1fr; } }
  .col h4 { margin:0 0 10px; font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  .taskcard { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:11px; margin-bottom:9px; cursor:pointer; }
  .taskcard:hover { border-color:var(--accent); }
  .taskcard .t { font-weight:600; margin-bottom:6px; }
  .taskcard .meta { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .empty { color:var(--muted); padding:20px; text-align:center; font-style:italic; }
  .linklike { color:var(--accent); cursor:pointer; }
  .linklike:hover { text-decoration:underline; }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:flex-start; justify-content:center; padding:60px 16px; z-index:50; overflow-y:auto; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; width:100%; max-width:520px; }
  .modal h3 { margin:0 0 6px; }
  .modal .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
  .errs { background:#3a1c1c; border:1px solid #7a2626; color:#ffb4b4; border-radius:7px; padding:10px 12px; margin:12px 0; font-size:12.5px; }
  .note { background:var(--surface2); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:7px; padding:10px 12px; margin:12px 0; font-size:12px; color:var(--muted); }
  .backlink { color:var(--muted); cursor:pointer; font-size:13px; margin-bottom:12px; display:inline-block; }
  .backlink:hover { color:var(--fg); }
  .metaline { color:var(--muted); font-size:12.5px; }
  /* Project cards */
  .viewtoggle { display:flex; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:3px; }
  .viewtoggle button { background:none; border:none; color:var(--muted); padding:6px 12px; border-radius:6px; cursor:pointer; font-size:12.5px; }
  .viewtoggle button.active { background:var(--primary); color:#fff; }
  .cardgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
  .pcard { background:var(--surface); border:1px solid var(--border); border-radius:11px; overflow:hidden; cursor:pointer; transition:border-color .15s; }
  .pcard:hover { border-color:var(--accent); }
  .pcover { height:120px; background:linear-gradient(150deg,var(--surface2),var(--primary)); display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:12px; }
  .pcover img { width:100%; height:100%; object-fit:cover; }
  .pbody { padding:13px 14px; }
  .pbody .t { font-weight:600; margin-bottom:6px; }
  .pbody .m { color:var(--muted); font-size:12px; display:flex; justify-content:space-between; gap:8px; align-items:center; }
  /* Members */
  .memberchips { display:flex; flex-wrap:wrap; gap:8px; }
  .memberchip { display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:4px 6px 4px 12px; font-size:12.5px; }
  .memberchip button { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; padding:0 5px; }
  .memberchip button:hover { color:#e07a7a; }
  .checkrow { display:flex; align-items:center; gap:9px; padding:7px 4px; border-bottom:1px solid var(--border); font-size:13px; }
  .checkrow:last-child { border-bottom:none; }
  .checkrow .sub { color:var(--muted); font-size:11.5px; }
  /* Auth */
  .auth-wrap { min-height:100vh; width:100%; display:flex; align-items:center; justify-content:center; padding:24px; }
  .auth-card { width:100%; max-width:400px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:28px; }
  .auth-card .brand { justify-content:center; margin-bottom:6px; }
  .auth-sub { text-align:center; color:var(--muted); font-size:12.5px; margin-bottom:20px; }
  .divider { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:11px; margin:18px 0 6px; }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
  #gsiBtn { display:flex; justify-content:center; margin-top:6px; min-height:40px; }
  /* Settings */
  .setrow { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin:10px 0; }
  .setrow .lbl { width:130px; color:var(--muted); font-size:12.5px; }
  .logoprev { width:44px; height:44px; border-radius:9px; border:1px solid var(--border); object-fit:cover; background:var(--surface2); }
  .coverprev { max-width:280px; max-height:130px; border-radius:8px; border:1px solid var(--border); display:block; margin-top:8px; object-fit:cover; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script src="workflows.js"></script>
<script>
const W = window.Workflows;
const STORE_KEY = 'projectTracker.state.v1';
const SESSION_KEY = 'projectTracker.session.v1';
const SETTINGS_KEY = 'projectTracker.settings.v1';
let DATA = null, CURRENT_USER = null, modal = null;
let SETTINGS = { logoDataUrl:null, theme:{}, githubToken:'', repo:'lukeq-mich/project-task-tracker' };
let route = { name: 'dashboard', param: null };
let COVER_PENDING = null; // { dataUrl, name } staged on the project form

// ---- Boot / persistence -----------------------------------------------------
async function boot() {
  let seed;
  try { seed = await (await fetch('data/data.json?ts=' + Date.now(), { cache:'no-store' })).json(); }
  catch (e) {
    document.getElementById('app').innerHTML =
      '<main><h2>Could not load data</h2><p>Ensure data/data.json is present and the page is served over http/https.</p></main>';
    return;
  }
  const stored = loadJson(STORE_KEY);
  DATA = {
    meta: seed.meta, enums: seed.enums, auth: seed.auth,
    users: stored ? stored.users : seed.users,
    projects: stored ? stored.projects : seed.projects,
    tasks: stored ? stored.tasks : seed.tasks,
    sequences: stored ? stored.sequences : seed.sequences,
  };
  if (!stored) persist();
  const s = loadJson(SETTINGS_KEY); if (s) SETTINGS = Object.assign(SETTINGS, s);
  applyBranding();
  const sess = loadJson(SESSION_KEY);
  if (sess) CURRENT_USER = DATA.users.find(u => u.id === sess.userId) || null;
  render();
}
function loadJson(k){ try { const s = localStorage.getItem(k); return s ? JSON.parse(s) : null; } catch(e){ return null; } }
function saveJson(k,v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
function persist(){ saveJson(STORE_KEY, { users:DATA.users, projects:DATA.projects, tasks:DATA.tasks, sequences:DATA.sequences }); scheduleRepoSync(); }

// ---- Repo write-back: with a GitHub token, every change is committed to data/data.json ----
let syncTimer = null, lastSync = '';
function scheduleRepoSync() {
  if (!SETTINGS.githubToken || !SETTINGS.repo) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToRepo, 1500); // debounce rapid edits into one commit
}
async function syncToRepo() {
  try {
    const content = JSON.stringify({
      meta: DATA.meta, auth: DATA.auth, enums: DATA.enums,
      users: DATA.users, projects: DATA.projects, tasks: DATA.tasks, sequences: DATA.sequences
    }, null, 2);
    const b64 = btoa(unescape(encodeURIComponent(content)));
    const headers = { 'Authorization':'Bearer '+SETTINGS.githubToken, 'Accept':'application/vnd.github+json' };
    let sha;
    const g = await fetch(`https://api.github.com/repos/${SETTINGS.repo}/contents/data/data.json`, { headers });
    if (g.ok) sha = (await g.json()).sha;
    const res = await fetch(`https://api.github.com/repos/${SETTINGS.repo}/contents/data/data.json`, {
      method:'PUT', headers,
      body: JSON.stringify({ message:'Update data from app', content:b64, ...(sha?{sha}:{}) })
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    lastSync = 'Synced ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.warn('Repo sync failed:', e.message);
    lastSync = 'Sync failed: ' + e.message;
  }
}
function persistSettings(){ saveJson(SETTINGS_KEY, SETTINGS); }
function setSession(id){ saveJson(SESSION_KEY, { userId:id }); CURRENT_USER = userById(id); }
function clearSession(){ try { localStorage.removeItem(SESSION_KEY); } catch(e){} CURRENT_USER = null; }
function resetData(){
  if (!confirm('Reset all local data back to the seeded sample content? This clears signups and changes made on this browser.')) return;
  try { localStorage.removeItem(STORE_KEY); localStorage.removeItem(SESSION_KEY); } catch(e){}
  location.reload();
}
function applyBranding() {
  const theme = Object.assign({}, DATA.meta.theme || {}, SETTINGS.theme || {});
  const r = document.documentElement.style;
  const map = { primary:'--primary', accent:'--accent', background:'--bg', surface:'--surface',
    surface2:'--surface2', border:'--border', foreground:'--fg', muted:'--muted' };
  Object.entries(map).forEach(([k,v]) => { if (theme[k]) r.setProperty(v, theme[k]); });
  document.title = DATA.meta.name || 'Project Tracker';
  if (SETTINGS.logoDataUrl) document.getElementById('faviconLink').href = SETTINGS.logoDataUrl;
}

// ---- Helpers ------------------------------------------------------------------
const enums = () => DATA.enums;
function brandInitials() {
  const words = (DATA.meta.name || 'Project Tracker').trim().split(/\s+/);
  return words.slice(0,2).map(w => w[0]).join('').toUpperCase();
}
function brandShieldHtml() {
  return SETTINGS.logoDataUrl ? `<img src="${SETTINGS.logoDataUrl}" alt="logo"/>` : brandInitials();
}
const esc = (s) => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const val = (id) => { const el = document.getElementById(id); return el ? el.value : ''; };
const norm = (v) => String(v==null?'':v).trim().toLowerCase();
const roleLabel = (k) => enums().userRole[k] || 'Unmapped';
const projStatusLabel = (k) => enums().projectStatus[k] || '—';
const taskStatusLabel = (k) => enums().taskStatus[k] || '—';
const taskPriorityLabel = (k) => enums().taskPriority[k] || '—';
const fmtDate = (d) => d ? new Date(d+'T00:00:00').toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}) : '—';
const byName = (a,b) => String(a.title||'').localeCompare(String(b.title||''));
const userById = (id) => DATA.users.find(u => u.id === id);
const projectById = (id) => DATA.projects.find(p => p.id === id);
const taskById = (id) => DATA.tasks.find(t => t.id === id);
function go(name, param=null){ route = { name, param }; COVER_PENDING = null; window.scrollTo(0,0); render(); }
function statusBadge(k, label){ return `<span class="badge" style="background:${W.statusColor(k)}">${esc(label)}</span>`; }
function priorityBadge(k){ return `<span class="badge" style="background:${W.priorityColor(k)}">${esc(taskPriorityLabel(k))}</span>`; }
function coverSrc(p){ return p.coverImage ? (p.coverImage.url || p.coverImage.dataUrl || null) : null; }
function taskCount(id){ const pr = W.projectProgress(DATA, id); return `${pr.done}/${pr.total} tasks done`; }
function safeUrl(u){ const s = String(u||'').trim(); return /^https?:\/\//i.test(s) ? s : null; }
function readFileAsDataUrl(file, cb) {
  const r = new FileReader();
  r.onload = () => cb(r.result);
  r.readAsDataURL(file);
}

// ---- Render root (focus-preserving: fixes the search-bar focus bug) ----------
function render() {
  const app = document.getElementById('app');
  // Capture focus + caret before re-render so typing in filters isn't interrupted.
  const active = document.activeElement;
  const focusId = active && active.id ? active.id : null;
  let selStart = null;
  if (focusId && typeof active.selectionStart === 'number') selStart = active.selectionStart;

  if (!CURRENT_USER) { app.innerHTML = renderAuth(); initGoogleSignIn(); return; }
  const role = CURRENT_USER.roleKey;
  const navItems = [
    { name:'dashboard', label:'Dashboard', show:W.canViewDashboard(role) },
    { name:'projects', label:'Projects', show:W.canViewProjectList(role) },
    { name:'my-tasks', label:'My Tasks', show:W.canViewMyTasks(role) },
    { name:'contributions', label:'Member Contributions', show:W.canViewMemberContributions(role) },
    { name:'users', label:'Users', show:W.canViewUsersAdmin(role) },
    { name:'settings', label:'Settings', show:W.isAdmin(role) },
  ].filter(i => i.show);

  const allowedNames = new Set(navItems.map(i=>i.name).concat(['project','task','project-form','task-form']));
  if (!allowedNames.has(route.name)) route = { name:'dashboard', param:null };

  app.innerHTML = `
    <aside>
      <div class="brand">
        <div class="shield">${brandShieldHtml()}</div>
        <div><h1>${esc(DATA.meta.name)}</h1><small>Delivery portfolio</small></div>
      </div>
      <nav>
        ${navItems.map(i => `<button class="${route.name===i.name?'active':''}" onclick="go('${i.name}')">${i.label}</button>`).join('')}
      </nav>
      <div class="who">
        <div class="name">${esc(CURRENT_USER.title)}</div>
        <div>${esc(CURRENT_USER.email||'')}</div>
        <div class="rolechip" style="margin-top:8px">${esc(roleLabel(CURRENT_USER.roleKey))}</div>
        <button class="btn ghost sm block" style="margin-top:12px" onclick="doLogout()">Log out</button>
        <button class="btn danger sm block" style="margin-top:8px" onclick="deleteMyAccount()">Delete my account</button>
      </div>
    </aside>
    <main>${renderPage()}</main>`;

  // Restore focus + caret (search inputs etc.)
  if (focusId) {
    const el = document.getElementById(focusId);
    if (el) { el.focus(); if (selStart!=null && el.setSelectionRange) { try { el.setSelectionRange(selStart, selStart); } catch(e){} } }
  }
}

function renderPage() {
  switch (route.name) {
    case 'dashboard': return pageDashboard();
    case 'projects': return pageProjects();
    case 'project': return pageProjectDetail(route.param);
    case 'project-form': return pageProjectForm(route.param);
    case 'task': return pageTaskDetail(route.param);
    case 'task-form': return pageTaskForm(route.param);
    case 'my-tasks': return pageMyTasks();
    case 'contributions': return pageContributions();
    case 'users': return pageUsers();
    case 'settings': return pageSettings();
    default: return pageDashboard();
  }
}

// ---- Auth ---------------------------------------------------------------------
let authErr = '';
function renderAuth() {
  const gEnabled = !!(DATA.auth && DATA.auth.googleClientId);
  return `
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="brand">
          <div class="shield">${brandShieldHtml()}</div>
          <div><h1>${esc(DATA.meta.name)}</h1></div>
        </div>
        <div class="auth-sub">${esc(DATA.meta.title||'')}</div>
        ${authErr?`<div class="errs">${esc(authErr)}</div>`:''}
        ${gEnabled
          ? `<div id="gsiBtn"></div>
             <div class="note">Sign in with your <strong>@${esc(DATA.auth.allowedDomain)}</strong> Google account — this is the only way to sign in or register. New sign-ins are registered as Members; an admin can promote you afterwards.</div>`
          : `<div class="errs">Google sign-in isn't configured (no client ID in <code>data/data.json</code>), so signing in is currently unavailable.</div>`}
      </div>
    </div>`;
}
function doLogout() { clearSession(); route = { name:'dashboard', param:null }; render(); }

function deleteMyAccount() {
  if (W.isSoleAdmin(DATA, CURRENT_USER)) {
    alert('You are the only Admin, so your account cannot be deleted — the site would be left without anyone able to manage users or settings. Promote another user to Admin first (Users page).');
    return;
  }
  if (!confirm('Delete your account?\n\nThis unassigns your tasks, removes you as a project lead, frees your project membership, and deletes your account on this browser. This cannot be undone.')) return;
  const id = CURRENT_USER.id;
  W.detachUserReferences(DATA, id);
  DATA.users = DATA.users.filter(u => u.id !== id);
  persist();
  clearSession();
  route = { name:'dashboard', param:null };
  render();
}

// Google Identity Services -------------------------------------------------------
let gsiLoaded = false, gsiLoading = false;
function initGoogleSignIn() {
  if (!DATA.auth || !DATA.auth.googleClientId) return;
  if (gsiLoaded) { mountGsiButton(); return; }
  if (gsiLoading) return;
  gsiLoading = true;
  const s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.async = true; s.defer = true;
  s.onload = () => {
    gsiLoaded = true;
    window.google.accounts.id.initialize({
      client_id: DATA.auth.googleClientId,
      hosted_domain: DATA.auth.allowedDomain || undefined,
      callback: onGoogleCredential,
    });
    mountGsiButton();
  };
  document.head.appendChild(s);
}
function mountGsiButton() {
  if (!gsiLoaded || CURRENT_USER) return;
  const target = document.getElementById('gsiBtn');
  if (target && window.google) {
    window.google.accounts.id.renderButton(target, { theme:'filled_blue', size:'large', width:340, text:'signin_with' });
  }
}
function decodeJwtPayload(cred) {
  const b64 = cred.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(b64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
}
function onGoogleCredential(resp) {
  let p;
  try { p = decodeJwtPayload(resp.credential); }
  catch(e) { authErr = 'Could not read the Google sign-in response.'; return render(); }
  const domain = DATA.auth.allowedDomain;
  const email = norm(p.email);
  const domainOk = (p.hd && norm(p.hd) === norm(domain)) || email.endsWith('@' + norm(domain));
  if (!p.email_verified || !domainOk) {
    authErr = `Only verified @${domain} Google accounts can sign in.`;
    return render();
  }
  let u = DATA.users.find(x => norm(x.email) === email);
  if (!u) {
    const isBootstrapAdmin = (DATA.auth.adminEmails || []).map(norm).includes(email);
    u = {
      id: ++DATA.sequences.user,
      title: p.name || email,
      email: p.email,
      roleKey: isBootstrapAdmin ? W.ROLE.ADMIN : W.signupRole(),
      projectMembership: null,
      googleAccount: true,
    };
    DATA.users.push(u); persist();
  }
  setSession(u.id); authErr = ''; go('dashboard');
}

// ---- Members batch-add ----------------------------------------------------------
function openMembersModal(projectId){ modal = { type:'members', projectId, checked:{} }; render(); }
function membersModalHtml() {
  const p = projectById(modal.projectId);
  const candidates = DATA.users.filter(u => !(u.projectMembership && u.projectMembership.id === p.id)).sort(byName);
  return `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Add members to ${esc(p.title)}</h3>
        <div class="note">Each person holds one project-membership slot, regardless of role (an admin's or executive's oversight is separate from their membership slot). Selecting someone already on another project will move them.</div>
        <div style="max-height:300px;overflow-y:auto;margin-top:8px">
          ${candidates.length?candidates.map(u=>`
            <label class="checkrow" style="cursor:pointer;margin:0">
              <input type="checkbox" ${modal.checked[u.id]?'checked':''} onchange="modal.checked[${u.id}]=this.checked">
              <span>${esc(u.title)} <span class="sub">· ${esc(roleLabel(u.roleKey))}${u.projectMembership?` · currently on ${esc(u.projectMembership.title)}`:''}</span></span>
            </label>`).join(''):'<div class="empty">Everyone is already on this project.</div>'}
        </div>
        <div class="modal-actions">
          <button class="btn ghost" onclick="closeModal()">Cancel</button>
          <button class="btn" onclick="saveMembers()">Add selected</button>
        </div>
      </div>
    </div>`;
}
function saveMembers() {
  const p = projectById(modal.projectId);
  const ids = Object.keys(modal.checked).filter(k=>modal.checked[k]).map(Number);
  if (!ids.length) { closeModal(); return; }
  let selected = ids.map(userById).filter(Boolean);
  const conflicts = selected.filter(u => u.projectMembership && u.projectMembership.id !== p.id);
  if (conflicts.length) {
    const msg = conflicts.map(u=>`• ${u.title} (currently on ${u.projectMembership.title})`).join('\n');
    if (!confirm(`Each person can only be on one project. Move the following to "${p.title}"?\n\n${msg}`)) {
      selected = selected.filter(u => !conflicts.includes(u)); // keep only conflict-free additions
    }
  }
  selected.forEach(u => { u.projectMembership = { id:p.id, title:p.title }; });
  persist(); closeModal();
}
function removeMember(userId) {
  const u = userById(userId);
  if (!u) return;
  if (!confirm(`Remove ${u.title} from this project? Their membership resets to none.`)) return;
  u.projectMembership = null; persist(); render();
}

function uploadLogo(file){ if(!file) return; readFileAsDataUrl(file, url => { SETTINGS.logoDataUrl=url; persistSettings(); applyBranding(); render(); }); }

// ---- Project form -----------------------------------------------------------------
function pageProjectForm(param) {
  const isNew = param==='new';
  const p = isNew ? { title:'', statusKey:'StatusKey0', startDate:'', endDate:'', projectLead:null, infoUrl:'', coverImage:null } : projectById(Number(param));
  if (!p) return `<p>Not found.</p>`;
  const leads = DATA.users.filter(u=>W.canBeProjectLead(u.roleKey)).sort(byName);
  const preview = COVER_PENDING ? COVER_PENDING.dataUrl : coverSrc(p);
  return `
    <span class="backlink" onclick="go('${isNew?'projects':'project'}'${isNew?'':','+p.id})">&larr; Back</span>
    <div class="page-head"><div><h2>${isNew?'New project':'Edit project'}</h2></div></div>
    <div class="card" style="max-width:640px">
      <div id="formErrs"></div>
      <label>Title</label><input id="f_title" value="${esc(p.title)}" style="width:100%"/>
      <div class="row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label>Start date</label><input id="f_start" type="date" onclick="this.showPicker&&this.showPicker()" value="${esc(p.startDate)}" style="width:100%"/></div>
        <div><label>End date</label><input id="f_end" type="date" onclick="this.showPicker&&this.showPicker()" value="${esc(p.endDate||'')}" style="width:100%"/></div>
      </div>
      <div class="row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label>Status</label><select id="f_status" style="width:100%">
          ${Object.entries(enums().projectStatus).map(([k,v])=>`<option value="${k}" ${p.statusKey===k?'selected':''}>${v}</option>`).join('')}
        </select></div>
        <div><label>Project lead</label><select id="f_lead" style="width:100%">
          <option value="">Unassigned</option>
          ${leads.map(u=>`<option value="${u.id}" ${p.projectLead&&p.projectLead.id===u.id?'selected':''}>${esc(u.title)}</option>`).join('')}
        </select></div>
      </div>
      <label>Info URL <span style="text-transform:none;letter-spacing:0">(e.g. a Google Drive folder — must start with http/https)</span></label>
      <input id="f_infourl" value="${esc(p.infoUrl||'')}" style="width:100%" placeholder="https://…"/>
      <label>Cover image</label>
      <input type="file" accept="image/*" onchange="stageCover(this.files[0])"/>
      ${preview?`<img class="coverprev" src="${preview}"/><div style="margin-top:6px"><button class="btn ghost sm" onclick="clearCover(${isNew?'null':p.id})">Remove cover</button></div>`:''}
      ${SETTINGS.githubToken?'':'<div class="note">No GitHub token set (Settings), so the cover is stored in this browser only — not committed to the repository.</div>'}
      <div class="modal-actions">
        <button class="btn ghost" onclick="go('${isNew?'projects':'project'}'${isNew?'':','+p.id})">Cancel</button>
        <button class="btn" onclick="saveProject(${isNew?'null':p.id})">Save</button>
      </div>
    </div>`;
}
function stageCover(file){ if(!file) return; readFileAsDataUrl(file, url => { COVER_PENDING = { dataUrl:url, name:file.name }; render(); }); }
function clearCover(id){ COVER_PENDING = null; if(id!=null){ const p=projectById(id); if(p) p.coverImage=null; persist(); } render(); }

async function uploadCoverToRepo(filename, dataUrl) {
  const token = SETTINGS.githubToken, repo = SETTINGS.repo;
  if (!token || !repo) return null;
  const base64 = dataUrl.split(',')[1];
  const safe = filename.replace(/[^a-zA-Z0-9._-]/g,'_');
  const path = 'cover-images/' + Date.now() + '-' + safe;
  const headers = { 'Authorization':'Bearer '+token, 'Accept':'application/vnd.github+json' };
  const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
    method:'PUT', headers,
    body: JSON.stringify({ message:'Upload cover image '+safe, content: base64 })
  });
  if (!res.ok) throw new Error('GitHub upload failed ('+res.status+')');
  const j = await res.json();
  return j.content.download_url;
}

async function saveProject(id) {
  const leadId = val('f_lead');
  const rec = {
    title: val('f_title'),
    startDate: val('f_start'),
    endDate: val('f_end') || null,
    statusKey: val('f_status'),
    infoUrl: val('f_infourl').trim() || null,
    projectLead: leadId ? { id:Number(leadId), title:userById(Number(leadId)).title } : null,
  };
  const errs = W.validateProject(rec);
  if (rec.infoUrl && !safeUrl(rec.infoUrl)) errs.push('Info URL must start with http:// or https://.');
  if (errs.length) { document.getElementById('formErrs').innerHTML = `<div class="errs">${errs.map(esc).join('<br>')}</div>`; return; }

  // Leads can only lead one project: confirm reassignment.
  if (rec.projectLead) {
    const others = DATA.projects.filter(p => p.projectLead && p.projectLead.id===rec.projectLead.id && p.id!==(id==null?-1:id));
    if (others.length) {
      const names = others.map(o=>`"${o.title}"`).join(', ');
      if (!confirm(`${rec.projectLead.title} already leads ${names}. Leads can only lead one project — unassign them there and assign here?`)) {
        return; // abort save so a different lead can be chosen
      }
      others.forEach(o => { o.projectLead = null; });
    }
  }

  // Cover image handling.
  if (COVER_PENDING) {
    if (SETTINGS.githubToken) {
      try {
        const url = await uploadCoverToRepo(COVER_PENDING.name, COVER_PENDING.dataUrl);
        rec.coverImage = { url };
      } catch (e) {
        alert('Uploading the cover to the repository failed ('+e.message+'). Storing it in this browser instead.');
        rec.coverImage = { dataUrl: COVER_PENDING.dataUrl };
      }
    } else {
      rec.coverImage = { dataUrl: COVER_PENDING.dataUrl };
    }
  } else if (id!=null) {
    rec.coverImage = projectById(id).coverImage || null;
  }

  let newId = id;
  if (id==null) { rec.id = ++DATA.sequences.project; DATA.projects.push(rec); newId = rec.id; }
  else { Object.assign(projectById(id), rec); }
  COVER_PENDING = null;
  reconcileReferences(); persist();
  go('project', newId);
}
function deleteProject(id) {
  const p = projectById(id);
  if (!p) return;
  const members = W.membersOfProject(DATA, id);
  if (!confirm(`Delete "${p.title}"?\n\nThis also deletes all its tasks and resets the project membership of ${members.length} user(s) to none.`)) return;
  DATA.projects = DATA.projects.filter(x=>x.id!==id);
  DATA.tasks = DATA.tasks.filter(t=>!(t.associatedProject && t.associatedProject.id===id));   // cascade tasks
  DATA.users.forEach(u=>{ if (u.projectMembership && u.projectMembership.id===id) u.projectMembership = null; }); // reset memberships
  persist(); go('projects');
}

// ---- Task form ---------------------------------------------------------------------
function pageTaskForm(param) {
  const role = CURRENT_USER.roleKey;
  const isNew = String(param).startsWith('new');
  let presetProject = null;
  if (isNew && String(param).includes(':')) presetProject = Number(String(param).split(':')[1]);
  const t = isNew
    ? { title:'', associatedProject: presetProject?{id:presetProject,title:projectById(presetProject).title}:null,
        assignedTo:null, statusKey:'StatusKey0', priorityKey:'PriorityKey1', dueDate:'', completionDate:null, taskDetailsInstructions:'' }
    : taskById(Number(param));
  if (!t) return `<p>Not found.</p>`;
  const memberOnly = W.canUpdateTaskMemberFields(role) && !W.canUpdateTaskCoreFields(role);
  const backTo = isNew ? (presetProject?`go('project',${presetProject})`:`go('projects')`) : `go('task',${t.id})`;
  return `
    <span class="backlink" onclick="${backTo}">&larr; Back</span>
    <div class="page-head"><div><h2>${isNew?'New task':'Edit task'}</h2>${memberOnly?'<p class="metaline">As a Member you can update status and completion date.</p>':''}</div></div>
    <div class="card" style="max-width:660px">
      <div id="formErrs"></div>
      <label>Title</label><input id="f_title" value="${esc(t.title)}" style="width:100%" ${memberOnly?'disabled':''}/>
      <div class="row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label>Project</label><select id="f_project" style="width:100%" ${memberOnly?'disabled':''}>
          <option value="">Select…</option>
          ${DATA.projects.map(p=>`<option value="${p.id}" ${t.associatedProject&&t.associatedProject.id===p.id?'selected':''}>${esc(p.title)}</option>`).join('')}
        </select></div>
        <div><label>Assigned to</label><select id="f_assignee" style="width:100%" ${memberOnly?'disabled':''}>
          <option value="">Unassigned</option>
          ${[...DATA.users].sort(byName).map(u=>`<option value="${u.id}" ${t.assignedTo&&t.assignedTo.id===u.id?'selected':''}>${esc(u.title)}</option>`).join('')}
        </select></div>
      </div>
      <div class="row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label>Priority</label><select id="f_priority" style="width:100%" ${memberOnly?'disabled':''}>
          ${Object.entries(enums().taskPriority).map(([k,v])=>`<option value="${k}" ${t.priorityKey===k?'selected':''}>${v}</option>`).join('')}
        </select></div>
        <div><label>Status</label><select id="f_status" style="width:100%">
          ${Object.entries(enums().taskStatus).map(([k,v])=>`<option value="${k}" ${t.statusKey===k?'selected':''}>${v}</option>`).join('')}
        </select></div>
      </div>
      <div class="row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label>Due date</label><input id="f_due" type="date" onclick="this.showPicker&&this.showPicker()" value="${esc(t.dueDate||'')}" style="width:100%" ${memberOnly?'disabled':''}/></div>
        <div><label>Completion date</label><input id="f_completion" type="date" onclick="this.showPicker&&this.showPicker()" value="${esc(t.completionDate||'')}" style="width:100%"/></div>
      </div>
      <label>Details / instructions</label>
      <textarea id="f_details" rows="3" style="width:100%" ${memberOnly?'disabled':''}>${esc(t.taskDetailsInstructions||'')}</textarea>
      <div class="modal-actions">
        <button class="btn ghost" onclick="${backTo}">Cancel</button>
        <button class="btn" onclick="saveTask(${isNew?'null':t.id})">Save</button>
      </div>
    </div>`;
}
function saveTask(id) {
  const role = CURRENT_USER.roleKey;
  const memberOnly = W.canUpdateTaskMemberFields(role) && !W.canUpdateTaskCoreFields(role);
  const existing = id!=null ? taskById(id) : null;
  let rec;
  if (memberOnly && existing) {
    rec = { ...existing, statusKey: val('f_status'), completionDate: val('f_completion') || null };
  } else {
    const pid = val('f_project'); const aid = val('f_assignee');
    rec = {
      title: val('f_title'),
      associatedProject: pid ? { id:Number(pid), title:projectById(Number(pid)).title } : null,
      assignedTo: aid ? { id:Number(aid), title:userById(Number(aid)).title } : null,
      priorityKey: val('f_priority'),
      statusKey: val('f_status'),
      dueDate: val('f_due') || null,
      completionDate: val('f_completion') || null,
      taskDetailsInstructions: val('f_details'),
    };
  }
  const errs = W.validateTask(rec);
  if (errs.length) { document.getElementById('formErrs').innerHTML = `<div class="errs">${errs.map(esc).join('<br>')}</div>`; return; }
  if (id==null) { rec.id = ++DATA.sequences.task; DATA.tasks.push(rec); persist(); go('task', rec.id); }
  else { Object.assign(existing, rec); persist(); go('task', id); }
}
function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  const pid = taskById(id).associatedProject.id;
  DATA.tasks = DATA.tasks.filter(t=>t.id!==id);
  persist(); go('project', pid);
}

// ---- User modal -------------------------------------------------------------------
function openUserModal(id){ modal = { type:'user', id }; render(); }
function closeModal(){ modal = null; render(); }
function userModalHtml() {
  const isNew = modal.id==null;
  const u = !isNew ? userById(modal.id) : { title:'', email:'', roleKey:'RoleKey3', projectMembership:null };
  return `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>${isNew?'New user':'Edit user'}</h3>
        <div id="userErrs"></div>
        <label>Name</label><input id="u_title" value="${esc(u.title)}" style="width:100%"/>
        <label>Email</label><input id="u_email" value="${esc(u.email||'')}" style="width:100%"/>
        <div class="row">
          <div><label>Role</label><select id="u_role" style="width:100%">
            ${Object.entries(enums().userRole).map(([k,v])=>`<option value="${k}" ${u.roleKey===k?'selected':''}>${v}</option>`).join('')}
          </select></div>
          <div><label>Project membership</label><select id="u_project" style="width:100%">
            <option value="">None</option>
            ${DATA.projects.map(p=>`<option value="${p.id}" ${u.projectMembership&&u.projectMembership.id===p.id?'selected':''}>${esc(p.title)}</option>`).join('')}
          </select></div>
        </div>
        <div class="modal-actions">
          <button class="btn ghost" onclick="closeModal()">Cancel</button>
          <button class="btn" onclick="saveUser(${isNew?'null':modal.id})">Save</button>
        </div>
      </div>
    </div>`;
}
async function saveUser(id) {
  const pid = val('u_project');
  const name = val('u_title').trim();
  const email = val('u_email').trim();
  const isNew = id==null;
  if (!name) { document.getElementById('userErrs').innerHTML = `<div class="errs">Name is required.</div>`; return; }
  if (DATA.users.some(u => norm(u.email)===norm(email) && u.id!==id)) { document.getElementById('userErrs').innerHTML = `<div class="errs">That email is already in use.</div>`; return; }
  const rec = {
    title: name, email,
    roleKey: val('u_role'),
    projectMembership: pid ? { id:Number(pid), title:projectById(Number(pid)).title } : null,
  };
  if (isNew) { rec.id = ++DATA.sequences.user; DATA.users.push(rec); }
  else { const existing = userById(id); Object.assign(existing, rec); if (CURRENT_USER.id===id) CURRENT_USER = existing; }
  persist(); modal = null; render();
}
function deleteUser(id) {
  if (id===CURRENT_USER.id) return;
  if (!confirm('Delete this user?')) return;
  DATA.users = DATA.users.filter(u=>u.id!==id);
  persist(); render();
}

// Keep denormalised title references in sync after edits.
function reconcileReferences() {
  DATA.tasks.forEach(t=>{
    if (t.associatedProject){ const p=projectById(t.associatedProject.id); if(p) t.associatedProject.title=p.title; }
    if (t.assignedTo){ const u=userById(t.assignedTo.id); if(u) t.assignedTo.title=u.title; }
  });
  DATA.projects.forEach(p=>{ if(p.projectLead){ const u=userById(p.projectLead.id); if(u) p.projectLead.title=u.title; } });
  DATA.users.forEach(u=>{ if(u.projectMembership){ const p=projectById(u.projectMembership.id); if(p) u.projectMembership.title=p.title; } });
}

boot();
</script>
